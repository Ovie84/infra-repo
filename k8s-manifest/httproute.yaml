apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: python-app-route
  namespace: traefik # 👈 Deployed here so Traefik can instantly see it
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: traefik-gateway
      namespace: traefik
  hostnames:
    - python-app.test.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: python-app-service
          namespace: default # 👈 Explicitly forwards traffic back to your app's namespace
          port: 8080
          weight: 1





